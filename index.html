<div class="app">
<link rel="stylesheet" href="style.css">
  <!-- HALAMAN UTAMA -->
  <section id="home" class="page active">

    <button class="menu-btn" onclick="bukaMenu()">☰</button>

    <h2>Masukkan nominal</h2>

    <div class="nominal-box">
      <span>Rp</span>
      <input 
        type="number" 
        id="nominal"
        placeholder="0"
      >
    </div>

    <h2>Kategori:</h2>

    <div class="kategori">
      <button onclick="tambahPemasukan()">
        Pemasukan
      </button>

      <button onclick="tambahPengeluaran()">
        Pengeluaran
      </button>
    </div>

    <h2>Saldo kamu saat ini:</h2>

    <div class="saldo-box">
      <span>Rp</span>
      <span id="saldo">0</span>
    </div>

  </section>


  <!-- MENU -->
  <section id="menu" class="page">

    <button class="back-btn" onclick="kembaliHome()">←</button>

    <h1>Menu</h1>

    <div class="menu-list">

      <button onclick="bukaHalaman('kalender')">
        Kalender
      </button>

      <button onclick="bukaHalaman('pengeluaran')">
        Pengeluaran
      </button>

      <button onclick="bukaHalaman('pemasukan')">
        Pemasukan
      </button>

    </div>

  </section>


  <!-- HALAMAN KALENDER -->
  <section id="kalender" class="page">

    <button class="back-btn" onclick="bukaMenu()">←</button>

    <h1>Tahun</h1>

    <h2 id="tahun"></h2>

    <div class="kalender-box">

      <h1 id="bulan"></h1>

      <div class="calendar-grid" id="calendar"></div>

    </div>

  </section>


  <!-- HALAMAN PENGELUARAN -->
  <section id="pengeluaran" class="page">

    <button class="back-btn" onclick="bukaMenu()">←</button>

    <h1>Pengeluaran</h1>

    <div id="listPengeluaran"></div>

  </section>


  <!-- HALAMAN PEMASUKAN -->
  <section id="pemasukan" class="page">

    <button class="back-btn" onclick="bukaMenu()">←</button>

    <h1>Pemasukan</h1>

    <div id="listPemasukan"></div>

  </section>

</div>
